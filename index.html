<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nginx Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7fafc;
        color: #2d3748;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        background: #ffffff;
        max-width: 560px;
      }
      h1 {
        margin-bottom: 0.5rem;
        color: #1a202c;
      }
      p {
        margin: 0;
        color: #4a5568;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to nginx</h1>
      <p>This page is served from the nginx Docker container.</p>
    </div>
  </body>
</html>
